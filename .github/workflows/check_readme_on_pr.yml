name: Check README on PR

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  check-readme:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.base_ref }}
          fetch-depth: 0

      - name: Merge PR changes
        run: |
          git fetch origin ${{ github.event.pull_request.head.sha }}
          git merge --no-commit ${{ github.event.pull_request.head.sha }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate blog JSON files
        run: python scripts/validate_jsons.py

      - name: Validate package JSON files
        run: python scripts/validate_packages.py

      - name: Run README generator
        run: python scripts/generate_readme.py

      - name: Run site generator
        run: python scripts/generate_site.py

      - name: Check for README changes
        id: check_diff
        run: |
          git add README.md
          if ! git diff --cached --quiet; then
            echo "README would be updated by this PR."
            echo "::warning file=README.md::README would be updated by this PR. Please update README."
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "README is up to date."
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Warn if README out of date
        if: steps.check_diff.outputs.changed == 'true'
        run: echo "README would be updated by this PR. Once merged, the site will be rebuilt automatically."
