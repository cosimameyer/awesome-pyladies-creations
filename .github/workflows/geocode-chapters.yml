name: Auto-geocode chapter content

on:
  push:
    paths:
      - 'data/content/**.json'

permissions:
  contents: write

jobs:
  geocode:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so we can commit back
          fetch-depth: 0
          ref: ${{ github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Geocode missing chapter coordinates
        run: python scripts/geocode_chapters.py

      - name: Commit geocoded coordinates (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/content/
          if git diff --cached --quiet; then
            echo "No coordinates to update."
          else
            git commit -m "chore: auto-geocode missing chapter coordinates"
            git push
          fi
